server {
    listen 80;
    server_name example.com;

    root /var/www/portfolio/public;
    index index.php;

    # Serve static files directly
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Try pretty URLs first, then route to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Linux Debian/Ubuntu default socket (adjust PHP version if needed)
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        # Or TCP: fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_index index.php;
    }

    # Security headers (basic example)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
